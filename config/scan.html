<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pebble Wallet — Card Scanner</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
h1 { font-size: 20px; margin: 0 0 6px; }
p { font-size: 14px; color: #aaa; margin: 0 0 16px; }
.btn { padding: 14px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; box-sizing: border-box; }
.btn-primary { background: #5856d6; color: #fff; }
.btn-stop { background: #ff3b30; color: #fff; margin-top: 8px; }
.btn-copy { background: #34c759; color: #fff; margin-top: 8px; }
video { width: 100%; border-radius: 10px; background: #000; display: block; }
#result { margin-top: 16px; }
.field { display: flex; gap: 8px; align-items: center; }
.value { flex: 1; padding: 12px; font-size: 16px; font-family: monospace; border-radius: 8px; border: 1px solid #444; background: #1c1c1e; color: #fff; box-sizing: border-box; }
.fmt { font-size: 13px; color: #8e8e93; margin: 8px 0; }
.status { font-size: 13px; margin-top: 12px; min-height: 16px; color: #aaa; }
.status.err { color: #ff453a; }
.status.ok { color: #30d158; }
.card { background: #1c1c1e; border-radius: 12px; padding: 14px; }
</style>
</head>
<body>

<h1>📷 Card Scanner</h1>
<p>Scan a barcode or QR code here, copy the number, then paste it into Pebble Wallet → <b>Add New Card</b> (this page can't send to the watch — the Pebble app does that).</p>

<div class="card">
  <button type="button" class="btn btn-primary" id="startBtn" onclick="startScan()">Start camera</button>
  <div id="view" style="display:none;margin-top:10px;">
    <video id="v" playsinline autoplay muted></video>
    <button type="button" class="btn btn-stop" onclick="stopScan('Stopped.')">Stop</button>
  </div>
  <div id="result"></div>
  <div id="status" class="status"></div>
</div>

<canvas id="frame" style="display:none;"></canvas>

<script>
var FMT_LABEL = {
  'Code128': 'Code 128', 'Code39': 'Code 39', 'Code93': 'Code 128',
  'EAN-13': 'EAN-13', 'EAN-8': 'EAN-13', 'UPC-A': 'Code 128', 'UPC-E': 'Code 128',
  'QRCode': 'QR Code', 'MicroQRCode': 'QR Code', 'Aztec': 'Aztec', 'PDF417': 'PDF417'
};

// Dynamic import kept out of parsed source so an old engine fails at call time
// (caught) rather than a parse-time SyntaxError. Rest of the page is plain ES5.
function dynImport(url) { return (new Function('u', 'return import(u);'))(url); }
var _zxing = null;
function loadZxing() {
  if (_zxing) return Promise.resolve(_zxing);
  return dynImport('https://esm.sh/zxing-wasm@2/reader')
    .catch(function() { return dynImport('https://cdn.jsdelivr.net/npm/zxing-wasm@2/reader/+esm'); })
    .then(function(mod) { _zxing = mod; return mod; });
}

var _stream = null, _scanning = false, _decoding = false;

function setStatus(msg, cls) {
  var s = document.getElementById('status');
  s.className = 'status' + (cls ? ' ' + cls : '');
  s.textContent = msg;
}

function startScan() {
  document.getElementById('result').innerHTML = '';
  setStatus('Starting camera…', '');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('This browser has no camera API. Try Chrome or Safari.', 'err');
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
    .then(function(stream) {
      _stream = stream;
      var v = document.getElementById('v');
      v.srcObject = stream;
      document.getElementById('view').style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
      _scanning = true;
      setStatus('Point the camera at the code…', '');
      setTimeout(scanTick, 500);
    })
    .catch(function(e) {
      setStatus('Camera blocked (' + (e && e.name ? e.name : e) + '). Allow camera access and try again.', 'err');
    });
}

function scanTick() {
  if (!_scanning) return;
  var v = document.getElementById('v');
  if (!_decoding && v && v.videoWidth) {
    _decoding = true;
    var cnv = document.getElementById('frame');
    cnv.width = v.videoWidth; cnv.height = v.videoHeight;
    var g = cnv.getContext('2d');
    g.drawImage(v, 0, 0, cnv.width, cnv.height);
    var img = g.getImageData(0, 0, cnv.width, cnv.height);
    loadZxing().then(function(mod) {
      return mod.readBarcodes(img, { tryHarder: true, maxNumberOfSymbols: 1 });
    }).then(function(results) {
      _decoding = false;
      if (_scanning && results && results.length && results[0].text) onScanned(results[0]);
    }).catch(function() { _decoding = false; });
  }
  if (_scanning) setTimeout(scanTick, 300);
}

function onScanned(r) {
  stopScan('');
  var label = FMT_LABEL[r.format] || 'Code 128';
  var esc = document.createElement('div'); esc.textContent = r.text;
  document.getElementById('result').innerHTML =
      '<div class="field"><input class="value" id="val" readonly value=""></div>'
    + '<div class="fmt">Detected: ' + r.format + '  →  in Pebble Wallet pick format <b>' + label + '</b>'
    + (FMT_LABEL[r.format] ? '' : ' (unsupported type; Code 128 is the safe fallback)') + '</div>'
    + '<button type="button" class="btn btn-copy" onclick="copyVal()">Copy number</button>'
    + '<button type="button" class="btn btn-primary" style="margin-top:8px;" onclick="startScan()">Scan again</button>';
  document.getElementById('val').value = r.text;
  setStatus('✓ Scanned. Copy it, then paste into Pebble Wallet → Add New Card.', 'ok');
}

function copyVal() {
  var input = document.getElementById('val');
  input.focus(); input.select(); input.setSelectionRange(0, input.value.length);
  var done = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(input.value).then(function() {
      setStatus('✓ Copied to clipboard.', 'ok');
    }).catch(function() { fallbackCopy(); });
    return;
  }
  fallbackCopy();
  function fallbackCopy() {
    try { done = document.execCommand('copy'); } catch (e) { done = false; }
    setStatus(done ? '✓ Copied to clipboard.' : 'Select the number above and copy it manually.', done ? 'ok' : '');
  }
}

function stopScan(msg) {
  _scanning = false;
  if (_stream) { _stream.getTracks().forEach(function(t) { t.stop(); }); _stream = null; }
  var v = document.getElementById('v'); if (v) v.srcObject = null;
  document.getElementById('view').style.display = 'none';
  document.getElementById('startBtn').style.display = '';
  if (msg) setStatus(msg, '');
}
</script>

</body>
</html>
